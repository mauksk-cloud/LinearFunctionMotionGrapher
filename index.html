<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Embodied Motion Graph</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://docs.opencv.org/4.x/opencv.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Embodied Motion Graph</h2>
<p>
1. Allow camera<br>
2. Enter marker size<br>
3. Calibrate at known distance<br>
4. Press Start Recording<br>
5. Move toward/away from camera
</p>

<div class="container">

  <div class="left">
    <video id="video" autoplay playsinline></video>
    <canvas id="overlay"></canvas>
    <h3 id="distanceDisplay">Distance: -- cm</h3>
  </div>

  <div class="right">

    <label>Marker Size (cm):</label>
    <input type="number" id="markerSize" value="10">

    <label>Calibration Distance (cm):</label>
    <input type="number" id="calibrationDistance" value="50">
    <label>Max Recording Time (seconds):</label>
    <input type="number" id="maxTime" value="10">
    <button id="calibrateBtn">Calibrate</button>

    <hr>

    <button id="startBtn">Start Recording</button>
    <button id="stopBtn">Stop Recording</button>
    <button id="clearBtn">Clear Data</button>
    <button id="exportBtn">Export CSV</button>

    <label>Smoothing (samples):</label>
    <input type="range" id="smoothSlider" min="1" max="10" value="3">

    <canvas id="chart"></canvas>

  </div>
</div>

<script>
  var Module = {
    onRuntimeInitialized() {
      console.log("OpenCV ready");
    }
  };
</script>
  
<script src="app.js"></script>
</body>
</html>
